name: CI - GRPC Server
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-grpc:
    name: Lint - GRPC Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "11.9.0"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.4.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm --filter @llamaindex/liteparse-grpc run lint

      - name: Format
        run: pnpm --filter @llamaindex/liteparse-grpc run prettier:check

  build-grpc-image:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build . -f packages/liteparse-grpc/Dockerfile
