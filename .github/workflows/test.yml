name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice imagemagick ghostscript tesseract-ocr

      - name: Install dependencies
        shell: bash
        run: bun install

      - name: Run formatter
        shell: bash
        run: bun run test
